<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TouchPrint Status</title>
  <meta name="description" content="TouchPrint service status">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body data-bs-theme="light">
  <div class="page-shell">
    <header class="topbar">
      <h1 class="brand">TouchPrint</h1>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
        <span class="theme-toggle-text">Dark</span>
      </button>
    </header>

    <section class="summary">
      <h2 id="summary-title" class="summary-title">Status unavailable</h2>
      <p id="summary-text" class="summary-text">Loading status data.</p>
    </section>

    <section class="panel" aria-labelledby="services-title">
      <div class="panel-header">
        <div>
          <h2 id="services-title" class="panel-title">System status</h2>
          <div id="updated-at" class="panel-subtitle">Loading</div>
        </div>
        <div id="summary-grid" class="panel-subtitle"></div>
      </div>
      <div id="service-list" class="service-list"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
